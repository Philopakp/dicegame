<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Error 404 Page Not Found - Dice Thrower</title>
<link rel="icon" type="image/png" href="./logo.png">

<style>
body{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
width:100vw;
margin:0;
box-sizing:border-box;
padding:32px;
background:#555;
color:#fff;
font-family:sans-serif;
user-select:none;
text-align:center;
overflow:hidden;
transition:1s background;
}

h1{
font-size:90px;
margin:0;
color:#fff;
letter-spacing:4px;
text-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.msg{
font-size:20px;
color:#e0e0e0;
margin-top:10px;
margin-bottom:20px;
}

.dice{
width:120px;
height:120px;
margin:20px 0;
display:flex;
justify-content:center;
align-items:center;
animation: float 2s ease-in-out infinite;
}

.dice svg{
width:100%;
height:100%;
display:block;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.error-box{
font-family:monospace;
background:rgba(0,0,0,0.15);
padding:12px 18px;
border-radius:12px;
border-left:4px solid #ff5722;
margin-bottom:20px;
max-width:90%;
word-break:break-word;
}

#broken-path{
color:#ff9800;
font-weight:bold;
}

#countdown{
color:#2196F3;
font-weight:bold;
}

.btn{
margin-top:15px;
padding:12px 24px;
border-radius:30px;
border:none;
cursor:pointer;
background:rgba(0,0,0,0.2);
color:#fff;
font-size:16px;
text-decoration:none;
border:1px solid rgba(255,255,255,0.2);
transition:0.2s;
}

.btn:hover{
background:rgba(255,255,255,0.1);
}

footer{
position:fixed;
top:2vmin;
right:2vmin;
padding:10px 18px;
border-radius:30px;
background:rgba(0,0,0,0.15);
font-size:14px;
color:#fff;
opacity:0.8;
}
</style>
</head>

<body>

<footer>Dice Thrower • 404</footer>

<h1>404</h1>
<div class="msg">Oops! That page rolled off the table.</div>

<!-- Floating dice -->
<div class="dice">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
<rect width="300" height="300" rx="60" fill="rgba(255,255,255,0.15)"/>
<circle cx="150" cy="150" r="25" fill="#fff"/>
</svg>
</div>

<div class="error-box">
The path <span id="broken-path">/loading...</span> does not exist.
</div>

<div class="msg">
Redirecting in <span id="countdown">5</span> seconds...
</div>

<a class="btn" href="./index.html">Go Back Now</a>

<script>
const currentPath = window.location.pathname;
document.getElementById("broken-path").textContent = currentPath;

let seconds = 5;
const countdownElement = document.getElementById("countdown");

const interval = setInterval(() => {
seconds--;
countdownElement.textContent = seconds;

if (seconds <= 0) {
clearInterval(interval);
window.location.href = "./index.html";
}
}, 1000);
</script>

</body>
</html>
