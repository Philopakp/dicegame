<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Thrower Secrets</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        margin: 0;
        box-sizing: border-box;
        padding: 20px;
        background: #333; /* Dark grey background to match the game style */
        color: #fff;
        font-family: sans-serif;
        user-select: none;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 20px;
        border-bottom: 2px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
        letter-spacing: 1px;
      }

      ul {
        list-style-type: none; /* Removes standard bullet points */
        padding: 0;
        margin: 0;
        max-width: 400px;
        width: 100%;
      }

      li {
        background: rgba(0, 0, 0, 0.15);
        margin: 10px 0;
        padding: 15px 20px;
        border-radius: 12px;
        font-size: 18px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: transform 0.2s;
      }

      li:hover {
        transform: scale(1.03);
        background: rgba(0, 0, 0, 0.25);
      }

      .back-btn {
        margin-top: 30px;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        font-size: 16px;
        transition: color 0.2s;
      }

      .back-btn:hover {
        color: #fff;
      }
    </style>
</head>
<body>

  <h1>Secrets</h1>
  
  <ul>
    <li>typing <strong>p1</strong> makes it so you get the dice 1</li>
    <li>typing <strong>p2</strong> makes it so you get the dice 2</li>
    <li>typing <strong>p3</strong> makes it so you get the dice 3</li>
    <li>typing <strong>p4</strong> makes it so you get the dice 4</li>
    <li>typing <strong>p5</strong> makes it so you get the dice 5</li>
    <li>typing <strong>p6</strong> makes it so you get the dice 6</li>
  </ul>

  <!-- A clean link to head back to the main rolling game -->
  <a href="./index.html" class="back-btn">← Back to Game</a>

</body>
</html>
