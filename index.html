<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/png" href="./logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Dice Thrower</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        margin: 0;
        box-sizing: border-box;
        padding: 32px 32px 64px;
        background: #555;
        user-select: none;
        overflow: hidden;
        cursor: pointer;
        transition: 1s background;
      }

      body>div {
        text-align: center;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px;
        max-width: 800px;
      }

      img {
        width: 180px;
        height: 180px;
        object-fit: contain;
      }

      @keyframes roll {
        25% { transform: rotate(95deg) }
        50% { transform: rotate(180deg) }
        75% { transform: rotate(-95deg) }
      }

      footer {
        position: fixed;
        top: 2vmin;
        right: 2vmin;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 24px;
        background: rgba(0,0,0,.1);
        color: #fff;
        text-align: center;
        display: flex;
        gap: 15px;
        z-index: 10;
      }
        
      footer:hover {
        background: rgba(0,0,0,.15);
      }

#snippet {
  position: absolute;
  width: 100%;
  left: 0;
  bottom: 5%;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}


      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div><img alt="2" src="2.svg"></div>
    <footer>
      <div id="js-increase">+</div>
      <div id="js-decrease">-</div>
    </footer>
    <div id="snippet"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {

        var container = document.querySelector("body > div");
        var dice = [document.querySelector("img")];
        var nums = [2]; 
        var sound = new Audio("roll.mp3"); 
        var colors = [
          "255, 87, 34",
          "76, 175, 80",
          "33, 150, 243",
          "63, 81, 181",
          "244, 143, 177",
          "121, 85, 72"
        ];

        // --- CHEAT CODE ENGINE ---
        var typedBuffer = ""; 
        var forcedRoll = null; 

        document.addEventListener("keydown", function(e) {
          if (e.key === " " || e.key === "Enter") {
            roll();
            return;
          }

          if (e.key.length === 1) {
            typedBuffer += e.key.toLowerCase();
            
            if (typedBuffer.length > 2) {
              typedBuffer = typedBuffer.slice(-2);
            }

            if (/^p[1-6]$/.test(typedBuffer)) {
              forcedRoll = parseInt(typedBuffer.charAt(1)); 
              console.log("Cheat activated! Next roll forced to: " + forcedRoll);
              typedBuffer = ""; 
            }
          }
        });
        // -------------------------

        function roll(e) {
          let id = e && e.target ? e.target.getAttribute("id") : null;
          if (id === "js-increase" || id === "js-decrease" || id === "js-link")
            return;
          
          for (let i = 0; i < dice.length; i++) {
            let die = dice[i];
            
            if (die.style.animation) return;
            die.style.animation = "roll 1s";
            
            sound.play().catch(err => console.log("Audio waiting for user interaction."));
        
            if (forcedRoll !== null) {
              nums[i] = forcedRoll;
            } else {
              nums[i] = Math.ceil(6 * Math.random());
            }

            setTimeout(function() {
              die.style.animation = "";
              die.src = nums[i] + ".svg"; 
              die.alt = nums[i];
            }, 1000);
          }
          
          let color = colors[Math.ceil(6 * Math.random()) - 1];
          document.body.style.background = "rgb(" + color + ")";

          forcedRoll = null;
        }

        document.addEventListener("click", roll);

        sound.load();

        function numDice(n) {
          if (n > 9) n = 1;
          
          container.innerHTML = "";
          dice = [];
          nums = []; 
          
          for (let i = 0; i < n; i++) {
            let die = document.createElement("img");
            die.src = "2.svg"; 
            die.alt = "2";
            container.appendChild(die);
            dice.push(die);
            nums.push(2); 
            
            if (n > 4) {
              die.style.width = "120px";
              die.style.height = "120px";
            } else {
              die.style.width = "180px";
              die.style.height = "180px";
            }
          }
        }

        document.querySelector("#js-increase").addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (dice.length < 9) numDice(dice.length + 1);
        });

        document.querySelector("#js-decrease").addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (dice.length > 1) numDice(dice.length - 1);
        });

        const offlineFallback = `<div id="dice-thrower-snippet"><p>Inspired by the Chrome Extension <a href="https://chromewebstore.google.com/detail/dice-thrower/gandnjjljgomdonoidfcjjockjngkjcc" target="_blank" id="js-link">Dice Thrower</a></p></div>`;

        if (window.navigator.onLine) {
          fetch("./snippet.html")
            .then(response => {
              if (!response.ok) throw new Error("Offline");
              return response.text();
            })
            .then(text => {
              if (text.includes("dice-thrower-snippet")) {
                document.querySelector("#snippet").innerHTML = text;
              } else {
                document.querySelector("#snippet").innerHTML = offlineFallback;
              }
            })
            .catch(() => {
              document.querySelector("#snippet").innerHTML = offlineFallback;
            });
        } else {
          document.querySelector("#snippet").innerHTML = offlineFallback;
        }

      });
    </script>
  </body>
</html>
