<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/png" href="./logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Dice Thrower</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100vw;
        margin: 0;
        box-sizing: border-box;
        padding: 32px 32px 64px;
        background: #555;
        user-select: none;
        overflow: hidden;
        cursor: pointer;
        transition: 1s background;
      }

      body>div {
        text-align: center;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px;
        max-width: 800px;
      }

      .die {
        width: 150px;
        height: 150px;
        background: white;
        color: #222;
        border-radius: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 110px;
        font-family: sans-serif;
        box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        transition: transform 0.1s;
      }

      @keyframes roll {
        25% { transform: rotate(95deg) scale(0.9); }
        50% { transform: rotate(180deg) scale(0.8); }
        75% { transform: rotate(-95deg) scale(0.9); }
      }

      footer {
        position: fixed;
        top: 2vmin;
        right: 2vmin;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 24px;
        background: rgba(0,0,0,.2);
        color: #fff;
        text-align: center;
        display: flex;
        gap: 15px;
        z-index: 10;
      }
        
      footer:hover {
        background: rgba(0,0,0,.3);
      }

      #snippet {
        position: absolute;
        width: 80%;
        left: 10%;
        bottom: 5%;
        color: #fff;
        text-align: center;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div><div class="die" alt="2">⚁</div></div>
    <footer>
      <div id="js-increase">+</div>
      <div id="js-decrease">-</div>
    </footer>
    <div id="snippet"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {

        var container = document.querySelector("body > div");
        var dice = [document.querySelector(".die")];
        var nums =;
        var sound = new Audio("roll.mp3"); 
        
        var diceFaces = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
        
        var colors = [
          "255, 87, 34",
          "76, 175, 80",
          "33, 150, 243",
          "63, 81, 181",
          "244, 143, 177",
          "121, 85, 72"
        ];

        // --- CHEAT CODE ENGINE ---
        var typedBuffer = ""; // Stores what the user types
        var forcedRoll = null; // Stores the forced roll number

        document.addEventListener("keydown", function(e) {
          // Ignore key hits if they are part of regular operations like spacebar/enter rolling
          if (e.key.length === 1) {
            typedBuffer += e.key.toLowerCase();
            
            // Keep only the last two characters typed to check for the code
            if (typedBuffer.length > 2) {
              typedBuffer = typedBuffer.slice(-2);
            }

            // Check if the sequence matches p1, p2, p3, p4, p5, or p6
            if (/^p[1-6]$/.test(typedBuffer)) {
              forcedRoll = parseInt(typedBuffer[1]); // Extract the number
              console.log("Cheat activated! Next roll forced to: " + forcedRoll);
              typedBuffer = ""; // Reset buffer
            }
          }
        });
        // -------------------------

        function roll(e) {
          let id = e && e.target ? e.target.getAttribute("id") : null;
          if (id === "js-increase" || id === "js-decrease" || id === "js-link")
            return;
          
          for (let i = 0; i < dice.length; i++) {
            let die = dice[i];
            
            if (die.style.animation) return;
            die.style.animation = "roll 1s";
            
            sound.play().catch(err => console.log("Audio skipped."));
        
            // If a cheat code was typed, use that number. Otherwise, choose randomly.
            if (forcedRoll !== null) {
              nums[i] = forcedRoll;
            } else {
              nums[i] = Math.ceil(6 * Math.random());
            }

            setTimeout(function() {
              die.style.animation = "";
              die.textContent = diceFaces[nums[i]]; 
              die.setAttribute("alt", nums[i]);
            }, 1000);
          }
          
          let color = colors[Math.ceil(6 * Math.random()) - 1];
          document.body.style.background = "rgb(" + color + ")";

          // Crucial: Clear the cheat code after the roll finishes so it doesn't repeat forever
          forcedRoll = null;
        }

        // Updated event listener to pass the event to the roll function cleanly
        document.addEventListener("keydown", function(e) {
          // Trigger a roll on Spacebar or Enter, but ignore single letters so you can type the cheat code
          if (e.key === " " || e.key === "Enter") {
            roll(e);
          }
        });
        document.addEventListener("click", roll);

        sound.load();

        function numDice(n) {
          if (n > 9) n = 1;
          
          container.innerHTML = "";
          dice = [];
          
          for (let i = 0; i < n; i++) {
            let die = document.createElement("div");
            die.className = "die";
            die.textContent = "⚁";
            container.appendChild(die);
            dice.push(die);
            
            if (n > 4) {
              die.style.width = "100px";
              die.style.height = "100px";
              die.style.fontSize = "70px";
              die.style.borderRadius = "16px";
            } else {
              die.style.width = "150px";
              die.style.height = "150px";
              die.style.fontSize = "110px";
              die.style.borderRadius = "24px";
            }
          }
        }

        document.querySelector("#js-increase").addEventListener("click", function() {
          if (dice.length < 9)
            numDice(dice.length + 1);
        });

        document.querySelector("#js-decrease").addEventListener("click", function() {
          if (dice.length > 1)
            numDice(dice.length - 1);
        });

        const offlineFallback = `<div id="dice-thrower-snippet"><p>Inspired by the Chrome Extension <a href="https://google.com" target="_blank" id="js-link">Dice Thrower</a></p></div>`;

        if (window.navigator.onLine) {
          fetch("./snippet.html")
            .then(response => {
              if (!response.ok) throw new Error("Offline");
              return response.text();
            })
            .then(text => {
              if (text.includes("dice-thrower-snippet")) {
                document.querySelector("#snippet").innerHTML = text;
              } else {
                document.querySelector("#snippet").innerHTML = offlineFallback;
              }
            })
            .catch(() => {
              document.querySelector("#snippet").innerHTML = offlineFallback;
            });
        } else {
          document.querySelector("#snippet").innerHTML = offlineFallback;
        }

      });
    </script>
  </body>
</html>
