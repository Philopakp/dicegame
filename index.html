<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="./logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dice Thrower</title>

  <style>
    body{display:flex;justify-content:center;align-items:center;min-height:100vh;width:100vw;margin:0;box-sizing:border-box;padding:32px 32px 64px;background:#555;user-select:none;overflow:visible;cursor:pointer;transition:1s background}
    #dice-container{text-align:center;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:20px;max-width:800px}
    img{width:180px;height:180px;object-fit:contain}
    @keyframes roll{25%{transform:rotate(95deg)}50%{transform:rotate(180deg)}75%{transform:rotate(-95deg)}}
    footer{position:fixed;top:2vmin;right:2vmin;padding:10px 20px;border-radius:30px;font-size:24px;background:rgba(0,0,0,.1);color:#fff;display:flex;gap:15px;z-index:10}
    footer:hover{background:rgba(0,0,0,.15)}
    footer button{font-size:24px;border:none;background:transparent;color:#fff;cursor:pointer}
    #snippet{position:absolute;left:0;right:0;bottom:5%;color:#fff;text-align:center}
    a{color:inherit}
.die{width:180px;height:180px;display:flex;justify-content:center;align-items:center;transform-origin: center center;}
    .die svg{width:100%;height:100%;display:block;overflow:visible;}
  </style>
</head>
<body>

<div id="dice-container">
  <div class="die"></div>
  </div>

<footer>
  <button id="js-increase" aria-label="Increase dice">+</button>
  <button id="js-decrease" aria-label="Decrease dice">-</button>
</footer>

<div id="snippet"></div>

<script>
document.addEventListener("DOMContentLoaded",function(){
const diceSvgs = [
"",

// Face 1
`
<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.6 297.2c49.5 0 89.8-40.3 89.8-90V92.8c0-49.6-40.3-90-89.8-90H93c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zm-57.6-75c-40 0-72.3-32.3-72.3-72.2 0-40 32.4-72.3 72.3-72.3 40 0 72.3 32.4 72.3 72.3 0 40-32.4 72.3-72.3 72.3z" fill="#fff"/></svg>
`,

// Face 2
`<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.3 297.2c49.6 0 90-40.3 90-90V92.8c0-49.6-40.4-90-90-90H92.7c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zM89 150c-34 0-61.3-27.4-61.3-61C27.7 55 55 27.6 89 27.6c33.6 0 61 27.4 61 61.2 0 33.6-27.4 61-61 61zm122 122.3c-33.6 0-61-27.4-61-61.2 0-33.6 27.4-61 61-61 34 0 61.3 27.4 61.3 61 0 34-27.4 61.3-61.2 61.3z" fill="#fff"/></svg>
`,

// Face 3
`
<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.6 297.2c49.5 0 89.8-40.3 89.8-90V92.8c0-49.6-40.3-90-89.8-90H93c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zM78.8 110C58 110 41 93.2 41 72.3 41 51.5 58 34.6 79 34.6c21 0 37.8 17 37.8 37.7 0 21-17 37.7-37.8 37.7zm71.2 77.7c-20.8 0-37.7-17-37.7-37.7 0-20.8 17-37.7 37.7-37.7 20.8 0 37.7 17 37.7 37.7 0 20.8-17 37.7-37.7 37.7zm75.5 75.5c-21 0-37.8-17-37.8-37.7 0-21 17-37.8 37.8-37.8 20.8 0 37.7 17 37.7 37.8 0 20.8-17 37.7-37.7 37.7z" fill="#fff"/></svg>
`,

// Face 4
`
<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.3 297.2c49.6 0 90-40.3 90-90V92.8c0-49.6-40.4-90-90-90H92.7c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zM84.6 142c-30 0-54.5-24.5-54.5-54.6C30 57.4 54.6 33 84.7 33c30 0 54.5 24.3 54.5 54.4 0 30-24.3 54.5-54.4 54.5zm0 130C54.6 272 30 248 30 217.7c0-30 24.5-54.4 54.6-54.4 30 0 54.5 24.3 54.5 54.4 0 30.2-24.3 54.5-54.4 54.5zM216 142c-30.2 0-54.6-24.5-54.6-54.6 0-30 24.4-54.5 54.5-54.5 30 0 54.4 24.3 54.4 54.4 0 30-24.4 54.5-54.5 54.5zm0 130c-30.2 0-54.6-24.2-54.6-54.4 0-30 24.4-54.4 54.5-54.4 30 0 54.4 24.3 54.4 54.4 0 30.2-24.4 54.5-54.5 54.5z" fill="#fff"/></svg>
`,

// Face 5
`
<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.6 297.2c49.5 0 89.8-40.3 89.8-90V92.8c0-49.6-40.3-90-89.8-90H93c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zM78.8 110C58 110 41 93.2 41 72.3 41 51.5 58 34.6 79 34.6c21 0 37.8 17 37.8 37.7 0 21-17 37.7-37.8 37.7zm71.2 77.7c-20.8 0-37.7-17-37.7-37.7 0-20.8 17-37.7 37.7-37.7 20.8 0 37.7 17 37.7 37.7 0 20.8-17 37.7-37.7 37.7zm-71.7 75.5c-20.8 0-37.7-17-37.7-37.7 0-21 17-37.8 37.7-37.8 21 0 37.7 17 37.7 37.8 0 20.8-16.8 37.7-37.7 37.7zm147.2 0c-21 0-37.8-17-37.8-37.7 0-21 17-37.8 37.8-37.8 20.8 0 37.7 17 37.7 37.8 0 20.8-17 37.7-37.7 37.7zm0-151c-21 0-37.8-17-37.8-37.7 0-21 17-37.7 37.8-37.7 20.8 0 37.7 16.8 37.7 37.7 0 20.8-17 37.7-37.7 37.7z" fill="#fff"/></svg>
`,

// Face 6
`
<svg xmlns="http://www.w3.org/2000/svg"><path d="M207.3 297.2c49.6 0 90-40.3 90-90V92.8c0-49.6-40.4-90-90-90H92.7c-49.6 0-90 40.4-90 90v114.6c0 49.6 40.4 90 90 90h114.6zM84.6 106.7c-20.4 0-37-16.5-37-37 0-20.3 16.6-36.8 37-36.8s37 16.4 37 36.8-16.6 37-37 37zm0 80.2c-20.4 0-37-16.6-37-37s16.6-37 37-37 37 16.6 37 37-16.6 37-37 37zm132-80.3c-20.3 0-36.8-16.5-36.8-37 0-20.3 16.5-36.8 37-36.8 20.3 0 36.8 16.4 36.8 36.8s-16.5 37-37 37zm0 80.2c-20.3 0-36.8-16.6-36.8-37s16.5-37 37-37c20.3 0 36.8 16.6 36.8 37s-16.5 37-37 37zm0 85c-20.3 0-36.8-16.4-36.8-36.8s16.5-37 37-37c20.3 0 36.8 16.6 36.8 37s-16.5 37-37 37zm-132 0c-20.4 0-37-16.4-37-36.8s16.6-37 37-37 37 16.6 37 37-16.6 37-37 37z" fill="#fff"/></svg>
`
];
const container=document.getElementById("dice-container");
let dice=[container.querySelector(".die")];
dice[0].innerHTML = diceSvgs[2];
  let nums=[2];
const sound=new Audio("roll.mp3");

const colors=[
"255, 87, 34","76, 175, 80","33, 150, 243",
"63, 81, 181","244, 143, 177","121, 85, 72"
];

let typedBuffer="";
let forcedRoll=null;
let activeInvert=false;
let activeGiant=false;
let activeTiny=false;
let discoInterval=null;
let rainbowInterval=null;
let rainbowHue=0;
function applyDiceStyles(){
  dice.forEach(die=>{
    let size=180;
    if(activeGiant) size=400;
    else if(activeTiny) size=40;
    else if(dice.length>4) size=120;

    die.style.width=size+"px";
    die.style.height=size+"px";
    die.style.transition="width .3s,height .3s,opacity .5s";
  });
}

applyDiceStyles();

document.addEventListener("keydown",function(e){

  if(e.key===" "||e.key==="Enter"){roll();return;}
  if(e.key.length!==1)return;

  typedBuffer+=e.key.toLowerCase();

  if(typedBuffer.length>20){
    typedBuffer=typedBuffer.slice(-20);
  }

  if(typedBuffer.includes("secret")){
    window.location.href="./secrets.html";
    return;
  }

  if(typedBuffer.includes("disco")){
    if(discoInterval){
      clearInterval(discoInterval);
      discoInterval=null;
    }else{
      discoInterval=setInterval(()=>{
        let c=colors[Math.floor(Math.random()*colors.length)];
        document.body.style.background="rgb("+c+")";
      },150);
    }
    typedBuffer="";
    return;
  }

  if(typedBuffer.includes("tiny")){
    activeTiny=!activeTiny;
    if(activeTiny) activeGiant=false;
    applyDiceStyles();
    typedBuffer="";
    return;
  }

  if(typedBuffer.includes("ghost")){
    document.querySelectorAll(".die").forEach(d=>{
      d.style.opacity=d.style.opacity==="0.2"?"1":"0.2";
    });
    typedBuffer="";
    return;
  }

  if(typedBuffer.includes("invert")){
    activeInvert=!activeInvert;
    document.body.style.transform=activeInvert?"rotate(180deg)":"none";
    typedBuffer="";
    return;
  }

  if(typedBuffer.includes("rainbow")){
    if(rainbowInterval){
      clearInterval(rainbowInterval);
      rainbowInterval=null;
      document.body.style.background="#555";
    }else{
      rainbowInterval=setInterval(()=>{
        rainbowHue=(rainbowHue+1)%360;
        document.body.style.background=`hsl(${rainbowHue},60%,50%)`;
      },30);
    }
    typedBuffer="";
    return;
  }

  if(typedBuffer.includes("giant")){
    activeGiant=!activeGiant;
    if(activeGiant) activeTiny=false;
    applyDiceStyles();
    typedBuffer="";
    return;
  }

  const lastTwo=typedBuffer.slice(-2);
  if(/^p[1-6]$/.test(lastTwo)){
    forcedRoll=parseInt(lastTwo[1],10);
  }
});

function roll(e){
  const id=e&&e.target?e.target.id:null;
  if(id==="js-increase"||id==="js-decrease"||id==="js-link") return;

  for(let i=0;i<dice.length;i++){
    const die=dice[i];
    if(die.style.animation) return;

    die.style.animation="roll 1s";
    sound.play().catch(()=>{});

    nums[i]=forcedRoll!==null?forcedRoll:Math.ceil(Math.random()*6);

    setTimeout(()=>{
      die.style.animation="";
      die.innerHTML = diceSvgs[nums[i]];
    },1000);
  }

  if(!rainbowInterval&&!discoInterval){
    const c=colors[Math.floor(Math.random()*colors.length)];
    document.body.style.background="rgb("+c+")";
  }

  forcedRoll=null;
}

document.addEventListener("click",roll);
sound.load();

function numDice(n){
  if(n>9)n=1;

  container.innerHTML="";
  dice=[];
  nums=[];

  for(let i=0;i<n;i++){
    const die=document.createElement("div");
    die.className="die";
    die.innerHTML=diceSvgs[2];
    container.appendChild(die);
    dice.push(die);
    nums.push(2);
  }

  applyDiceStyles();
}

document.getElementById("js-increase").addEventListener("click",e=>{
  e.stopPropagation();
  if(dice.length<9) numDice(dice.length+1);
});

document.getElementById("js-decrease").addEventListener("click",e=>{
  e.stopPropagation();
  if(dice.length>1) numDice(dice.length-1);
});

const offlineFallback='<div id="dice-thrower-snippet"><p>Inspired by the Chrome Extension <a href="https://chromewebstore.google.com/detail/dice-thrower/gandnjjljgomdonoidfcjjockjngkjcc" target="_blank" id="js-link">Dice Thrower</a></p></div>';

if(navigator.onLine){
  fetch("./snippet.html")
  .then(r=>{if(!r.ok) throw new Error(); return r.text();})
  .then(t=>{
    document.getElementById("snippet").innerHTML=t.includes("dice-thrower-snippet")?t:offlineFallback;
  })
  .catch(()=>{
    document.getElementById("snippet").innerHTML=offlineFallback;
  });
}else{
  document.getElementById("snippet").innerHTML=offlineFallback;
}

});
</script>
</body>
</html>
